<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>WormSlither Arena - Phaser WebGL</title>
  
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

  <!-- Phaser 3 (WebGL) -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

  <!-- Game Logic -->
  <script src="js/AudioSystem.js"></script>
  <script src="js/ParticleSystem.js"></script>
  <script src="js/FoodSystem.js"></script>
  <script src="js/PowerUpSystem.js"></script>
  <script src="js/Collision.js"></script>
  <script src="js/PlayerWorm.js"></script>
  <script src="js/SmartBot.js"></script>
  <script src="js/GameLoop.js"></script>

  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #110022; }
    canvas { display: block; }
    
    /* HUD Overlay */
    #hud {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; font-family: 'Segoe UI', sans-serif;
    }
    .hud-top-left { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px #000; }
    .score-display { font-size: 28px; font-weight: bold; color: #ffd700; }
    .room-info { font-size: 14px; opacity: 0.8; }
    
    .leaderboard {
      position: absolute; top: 20px; right: 20px;
      background: rgba(0,0,0,0.5); padding: 10px 15px; border-radius: 12px;
      color: white; min-width: 150px; backdrop-filter: blur(5px);
    }
    .leaderboard h3 { margin: 0 0 8px; font-size: 16px; color: #00ffff; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px; }
    .leaderboard-list { list-style: none; padding: 0; margin: 0; font-size: 14px; }
    .leaderboard-list li { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .leaderboard-list li.me { color: #ffd700; font-weight: bold; }

    #boost-btn {
      position: absolute; bottom: 30px; right: 30px;
      width: 80px; height: 80px; border-radius: 50%;
      background: radial-gradient(circle, #ff4500, #ff0000);
      border: 4px solid #fff; box-shadow: 0 0 15px rgba(255,69,0,0.6);
      color: white; font-weight: bold; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      pointer-events: auto; cursor: pointer; user-select: none;
    }
    #boost-btn:active { transform: scale(0.9); }

    #mute-btn {
      position: absolute; bottom: 30px; left: 30px;
      width: 50px; height: 50px; border-radius: 50%;
      background: rgba(0,0,0,0.5); border: 2px solid #fff;
      color: white; font-size: 24px; display: flex; align-items: center; justify-content: center;
      pointer-events: auto; cursor: pointer; backdrop-filter: blur(5px);
    }

    #loading-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: #0a001f; display: flex; align-items: center; justify-content: center;
      flex-direction: column; color: white; z-index: 200;
    }
    .loader {
      border: 6px solid #333; border-top: 6px solid #00ffff;
      border-radius: 50%; width: 50px; height: 50px;
      animation: spin 1s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="loader"></div>
    <div>Loading WebGL Engine...</div>
  </div>

  <!-- Phaser Canvas will be injected here automatically -->

  <div id="hud">
    <div class="hud-top-left">
      <div class="score-display">Score: <span id="score-val">0</span></div>
      <div class="room-info">Room: <span id="room-id-display">...</span></div>
    </div>

    <div class="leaderboard">
      <h3>🏆 Leaderboard</h3>
      <ul class="leaderboard-list" id="leaderboard-list"><li>Loading...</li></ul>
    </div>

    <div id="boost-btn">BOOST</div>
    <div id="mute-btn" onclick="toggleMute()">🔊</div>
  </div>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyBMSV8rITmrGZjLlY5dREwzqxvatAxscsY",
      authDomain: "snake-worm-io-680e9.firebaseapp.com",
      databaseURL: "https://snake-worm-io-680e9-default-rtdb.firebaseio.com",
      projectId: "snake-worm-io-680e9",
      storageBucket: "snake-worm-io-680e9.firebasestorage.app",
      messagingSenderId: "767752248326",
      appId: "1:767752248326:web:0599704f6948e33546b787",
      measurementId: "G-HDCHQZMNV1"
    };
    firebase.initializeApp(firebaseConfig);

    function toggleMute() {
        AudioSystem.init();
        const isMuted = AudioSystem.toggleMute();
        document.getElementById('mute-btn').textContent = isMuted ? '🔇' : '🔊';
    }
    document.addEventListener('click', () => AudioSystem.init(), { once: true });
  </script>
</body>
</html>
